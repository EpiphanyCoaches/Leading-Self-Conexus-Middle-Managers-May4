},{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"You may also need to consider what to let go of,\",\"type\":\"text\",\"version\":1},{\"type\":\"textToSpeechBreak\",\"version\":1,\"duration\":0.3},{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\" how to involve or empower others, \",\"type\":\"text\",\"version\":1},{\"type\":\"textToSpeechBreak\",\"version\":1,\"duration\":0.3},{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"and what values will guide your decisions while uncertainty still exists.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AlloyTurboMultilingualNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AlloyTurboMultilingualNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Even during change, leaders can create direction and psychological safety by continuing to take intentional action.”\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AlloyTurboMultilingualNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","featureAdoption":{"isAddingPauses":true,"isAdjustingSpeed":false,"isUsingMultipleVoices":false},"promptText":"“In the last workshop, you discussed one of the biggest challenges that comes with change—uncertainty—and some ways leaders can help mitigate it. Let’s take a moment to refresh and expand on that conversation.\n\nThe goal during change is not to eliminate all uncertainty. That’s usually impossible. The goal is to create enough clarity, calm, and direction to keep moving yourself and your people forward.\n\nT ationAngle":0},{"height":523,"width":833,"x":35,"y":119,"htmlContent":"\u003cdiv>\n\u003cdiv>\n\u003cdiv>\n\u003cdiv>\n\u003cdiv>\u003cspan style=\"color:rgba(112,61,214,1)\">\u003cstrong>\u003cspan style=\"font-size:22.4px\">Intimacy is often the most powerful&mdash;and overlooked&mdash;driver of trust. \u003c/span>\u003c/strong>\u003c/span>\u003c/div>\n\n\u003cdiv>&nbsp;\u003c/div>\n\n\u003cdiv>\u003cspan style=\"color:#000000\">\u003cspan style=\"font-size:22.4px\">It&rsquo;s about emotional safety, not oversharing.\u003c/span>\u003c/span>\u003c/div>\n\n\u003cdiv>&nbsp;\u003c/div>\n\n\u003cdiv>\u003cspan style=\"color:#000000\">\u003cspan style=\"font-size:22.4px\">Here are the ways we brainstormed to build trust and intimacy in the workshop:\u003cbr />\n\u003cbr />\n\u003cstrong>&bull;&nbsp; Be intentional about connection through 1:1s and regular check-ins\u003cbr />\n&bull;&nbsp; Learn what matters most to your people (their values and motivators)\u003cbr />\n&bull;&nbsp; Get to know people beyond just their work\u003cbr />\n&bull;&nbsp; Create space for people to be human and authentic\u003cbr />\n&bull;&nbsp; Lead by example through openness and vulnerability\u003cbr />\n&bull;&nbsp; Ask for input and involve others in conversations\u003cbr />\n&bull;&nbsp; Follow up on progress and recognize effort and achievements\u003cbr />\n&bull;&nbsp; Use team rituals and social moments to strengthen relationships\u003c/strong>\u003c/span>\u003c/span>\u003cbr />\n\u003cbr />\n\u003cspan style=\"color:#000000\">\u003cspan style=\"font-size:22.4px\">Leading self means intentionally building trust&mdash;one relationship at a\u003cbr />\ntime.\u003c/span>\u003c/span>\u003c/div>\n\u003c/div>\n\u003c/div>\n\u003c/div>\n\u003c/div>\n","identifier":"uYeQ2QvkQQht3aYGt","customStyle":{"verticalAlignment":"top","lineHeight":1.4,"textAlignment":"left","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,
